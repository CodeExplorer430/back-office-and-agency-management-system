name: CT2 Quality Gate

permissions:
  contents: read

concurrency:
  group: ct2-quality-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  strict-suite-linux:
    name: Strict Suite (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ct2_back_office
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
    env:
      CT2_DB_HOST: 127.0.0.1
      CT2_DB_PORT: 3306
      CT2_DB_NAME: ct2_back_office
      CT2_DB_USER: root
      CT2_DB_PASS: root
      NODE_OPTIONS: --experimental-websocket
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Set up Node.js
        # actions/setup-node@v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Set up Chrome
        id: chrome
        # browser-actions/setup-chrome@v2.1.1
        uses: browser-actions/setup-chrome@3ba2f2bc81ddf8088ecbacdea69d476631049f8b

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          for attempt in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become healthy in time." >&2
          exit 1

      - name: Import CT2 schema
        run: mysql -h 127.0.0.1 -uroot -proot ct2_back_office < ct2_back_office/ct2_setup.sql

      - name: Run strict validation suite
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: bash ct2_back_office/scripts/ct2_validation_suite.sh

  strict-suite-powershell:
    name: Strict Suite (PowerShell)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - strict-suite-linux
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ct2_back_office
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30
    env:
      CT2_DB_HOST: 127.0.0.1
      CT2_DB_PORT: 3306
      CT2_DB_NAME: ct2_back_office
      CT2_DB_USER: root
      CT2_DB_PASS: root
      NODE_OPTIONS: --experimental-websocket
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.1
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Set up Node.js
        # actions/setup-node@v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Set up Chrome
        id: chrome
        # browser-actions/setup-chrome@v2.1.1
        uses: browser-actions/setup-chrome@3ba2f2bc81ddf8088ecbacdea69d476631049f8b

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          for attempt in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become healthy in time." >&2
          exit 1

      - name: Import CT2 schema
        run: mysql -h 127.0.0.1 -uroot -proot ct2_back_office < ct2_back_office/ct2_setup.sql

      - name: Run PowerShell strict validation suite
        shell: pwsh
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: .\ct2_back_office\scripts\ct2_validation_suite.ps1
